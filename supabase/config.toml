[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://localhost:4200"
additional_redirect_urls = ["http://localhost:4200/auth/callback", "http://localhost:4200/dashboard"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[functions.mollie-webhook]
verify_jwt = false

[edge_runtime.secrets]
MOLLIE_API_KEY = "env(MOLLIE_API_KEY)"
