version: 1
project:
  name: asd-angular-supabase
  description: Angular + Supabase boilerplate with ASD platform integration
  domain: localhost
  env_template: 'tpl.env'
  project_root: angular:dev
  plugins:
    - supabase
  hub:
    globalSettings:
      theme: light
      widgetStoreUrl: []
      database: localStorage
      hideBoardControl: true
      hideViewControl: false
      hideServiceControl: false
      showMenuWidget: false
      views:
        showViewOptionsAsButtons: true
        viewToShow: Studio
      localStorage:
        enabled: 'true'
        loadDashboardFromConfig: 'true'
    boards:
      - id: board-supabase
        name: Development
        order: 0
        views:
          - id: view-app
            name: App
            maxInstances: 10
            widgets:
              - id: widget-app
                order: '0'
                columns: 8
                rows: 6
                type: iframe
                serviceId: angular:dev
          - id: view-studio
            name: Studio
            maxInstances: 10
          - id: view-code
            name: Code Studio
            maxInstances: 10
            widgets:
              - id: widget-codeserver
                order: '0'
                columns: 8
                rows: 6
                type: iframe
                serviceId: codeserver
          - id: view-terminal
            name: Terminal
            maxInstances: 10
            widgets:
              - id: widget-ttyd
                order: '0'
                columns: 8
                rows: 6
                type: iframe
                serviceId: ttyd
    styling:
      widget:
        minColumns: 1
        maxColumns: 8
        minRows: 1
        maxRows: 6

features:
  auto_detect_services: false
  auto_install_binaries: true
  ingress_header: true
  enable_restricted_ports: false
  hub_visibility: public
  auto_start_caddy: true
  auto_start_ttyd: true
  auto_start_codeserver: true

automation:
  dev:
    - name: Bootstrap Supabase
      run: asd supabase bootstrap
    - name: Start Caddy
      run: asd caddy start
    - httpWaitFor:
        url: 'http://127.0.0.1:${{ env.ASD_CADDY_ADMIN_PORT }}/config/'
        expectStatus: 200
    - name: Apply network configuration
      run: asd net apply --seed --caddy --tunnel
    - name: Start ttyd
      command: ASD_NO_PROMPT=1 asd ttyd start
      background: true
      skipWhen:
        port: ${{ env.ASD_TTYD_PORT }}
    - name: Start code-server
      command: asd code start
      background: true
      skipWhen:
        port: ${{ env.ASD_CODESERVER_PORT }}
    - name: Start dev server
      command: pnpm dev
      background: true
      skipWhen:
        port: 4200
    - httpWaitFor:
        url: 'http://127.0.0.1:4200'
        expectStatus: 200
    - name: Display hub URL
      run: asd hub url

  start:
    - name: Bootstrap Supabase
      run: asd supabase bootstrap
    - name: Start Caddy
      run: asd caddy start
    - httpWaitFor:
        url: 'http://127.0.0.1:${{ env.ASD_CADDY_ADMIN_PORT }}/config/'
        expectStatus: 200
    - name: Apply network configuration
      run: asd net apply --seed --caddy --tunnel
  stop:
    - name: Stop Caddy
      run: asd caddy stop
    - name: Stop Supabase
      run: asd supabase stop

  down:
    - name: Stop Caddy
      run: asd caddy stop
    - name: Stop Supabase
      run: npx supabase stop --no-backup

  check-all:
    - name: Lint
      run: pnpm lint
    - name: Typecheck
      run: pnpm typecheck
    - name: Format check
      run: pnpm format:check
    - name: Unit tests
      run: pnpm test:run
    - name: Duplication check
      run: pnpm duplication:check

  test-e2e:
    - name: Playwright E2E tests
      run: pnpm exec playwright test

  # Quality
  lint:
    - run: pnpm lint
  typecheck:
    - run: pnpm typecheck
  format:
    - run: pnpm format
  format-check:
    - run: pnpm format:check
  check:
    - run: pnpm lint
    - run: pnpm typecheck
    - run: pnpm format:check

  # Testing
  test:
    - run: pnpm test
  test-run:
    - run: pnpm test:run
  test-coverage:
    - run: pnpm test:coverage
  test-e2e-headed:
    - run: pnpm exec playwright test --headed
  test-e2e-ui:
    - run: pnpm exec playwright test --ui
  test-e2e-chromium:
    - run: pnpm exec playwright test --project=chromium
  test-e2e-firefox:
    - run: pnpm exec playwright test --project=firefox
  test-e2e-webkit:
    - run: pnpm exec playwright test --project=webkit
  test-e2e-report:
    - run: pnpm exec playwright show-report

  # Duplication
  duplication:
    - run: pnpm duplication
  duplication-check:
    - run: pnpm duplication:check

  # Supabase
  supa-start:
    - run: asd supabase start
  supa-stop:
    - run: asd supabase stop
  supa-status:
    - run: npx supabase status
  supa-reset:
    - run: npx supabase db reset
  supa-types-local:
    - run: npx supabase gen types typescript --local > src/app/core/types/database.types.ts

tunnels:
  mode: 'caddy'

network:
  caddy:
    enable: true
    tls:
      enabled: true
      auto: true
  services:
    supabase:studio:
      public: true
      tunnelPort: 54323
      subdomain: ${{ env.ENV_PREFIX }}studio
      tunnelProtocol: http

    supabase:api:
      name: Supabase API
      dial: 127.0.0.1:54321
      public: true
      subdomain: ${{ env.ENV_PREFIX }}api
      tunnelPort: 54321
      tunnelProtocol: http
      basic_auth:
        enabled: false

    angular:dev:
      name: ASD Angular
      dial: 127.0.0.1:4200
      host: app.localhost
      publishPreferred: host
      stripPrefix: false
      public: true
      tunnelPort: 4200
      subdomain: ${{ env.ENV_PREFIX }}app
      tunnelProtocol: http
      process:
        cmd: pnpm dev
        cwd: .
      priority: 100
      description: Angular development server - main frontend
    codeserver:
      public: false
    ttyd:
      public: false
