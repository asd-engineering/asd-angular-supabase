name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [build, prod]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.target }} image
        run: docker build --target ${{ matrix.target }} -f docker/Dockerfile .
