name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Supabase
        run: npx supabase start

      - name: Extract Supabase keys
        run: |
          eval "$(npx supabase status -o env 2>/dev/null | grep -E '^(PUBLISHABLE_KEY|SECRET_KEY|API_URL)=')"
          echo "SUPABASE_URL=${API_URL:-http://127.0.0.1:54321}" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=${PUBLISHABLE_KEY}" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=${SECRET_KEY}" >> "$GITHUB_ENV"

      - name: Wait for Supabase to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:54321/rest/v1/" -H "apikey: ${SUPABASE_ANON_KEY}" > /dev/null 2>&1; then
              echo "Supabase is healthy"
              break
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done

      - name: Install ASD CLI
        run: |
          curl -fsSL https://asd.host/install.sh | VERSION=v2.5.0-beta.8 bash
          asd --version

      - name: Login to ASD platform
        if: ${{ secrets.ASD_API_KEY != '' }}
        env:
          ASD_API_KEY: ${{ secrets.ASD_API_KEY }}
        run: |
          asd login key "$ASD_API_KEY"
          echo "ASD login complete"

      - name: Create tunnel
        if: ${{ secrets.ASD_API_KEY != '' }}
        run: |
          asd init --yes
          asd caddy start
          asd net apply --seed --caddy --tunnel

          API_TUNNEL_URL=$(grep '^API_TUNNEL_URL=' .env | cut -d= -f2- | tr -d '"')
          echo "API_TUNNEL_URL=${API_TUNNEL_URL}" >> "$GITHUB_ENV"
          echo "Tunnel URL: ${API_TUNNEL_URL}"

      - name: Verify tunnel delivers content
        if: ${{ secrets.ASD_API_KEY != '' }}
        run: |
          mkdir -p /tmp/www
          echo '<html><body><h1>ASD Tunnel Works!</h1></body></html>' > /tmp/www/index.html
          python3 -m http.server 4200 --directory /tmp/www &
          STATIC_PID=$!
          sleep 2

          BODY=$(curl -sf "$API_TUNNEL_URL" 2>&1) || { echo "FAIL: tunnel not reachable"; curl -v "$API_TUNNEL_URL" 2>&1; kill $STATIC_PID; exit 1; }
          echo "$BODY"
          echo "$BODY" | grep -q "ASD Tunnel Works" && echo "Tunnel verified OK" || { echo "FAIL: unexpected response"; kill $STATIC_PID; exit 1; }

          kill $STATIC_PID
          wait $STATIC_PID 2>/dev/null || true

      - name: Set Mollie env
        if: ${{ secrets.MOLLIE_API_KEY != '' }}
        run: echo "MOLLIE_API_KEY=${{ secrets.MOLLIE_API_KEY }}" >> "$GITHUB_ENV"

      - name: Run Playwright tests
        env:
          CI: 'true'
          BASE_URL: 'http://localhost:4200'
        run: pnpm exec playwright test --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          asd caddy stop 2>/dev/null || true
          asd tunnel server stop 2>/dev/null || true
          npx supabase stop || true
