name: Tunnel Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tunnel-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install ASD CLI
        run: |
          curl -fsSL https://asd.host/install.sh | VERSION=v2.5.0-beta.8 bash
          asd --version

      - name: Login to ASD platform
        env:
          ASD_API_KEY: ${{ secrets.ASD_API_KEY }}
        run: |
          asd login key "$ASD_API_KEY"
          echo "ASD login complete"

      - name: Initialize and create tunnel
        run: |
          asd init --yes
          asd caddy start
          asd net apply --seed --caddy --tunnel

      - name: Serve welcome page and verify tunnel
        run: |
          mkdir -p /tmp/www
          cat > /tmp/www/index.html <<'HTML'
          <html><body><h1>ASD Tunnel Works!</h1></body></html>
          HTML
          python3 -m http.server 4200 --directory /tmp/www &
          sleep 2

          API_TUNNEL_URL=$(grep '^API_TUNNEL_URL=' .env | cut -d= -f2- | tr -d '"')
          echo "=== Tunnel URL: $API_TUNNEL_URL ==="

          echo "=== Fetching through tunnel ==="
          BODY=$(curl -sf "$API_TUNNEL_URL" 2>&1) || { echo "FAIL: curl returned $?"; curl -v "$API_TUNNEL_URL" 2>&1; exit 1; }
          echo "$BODY"

          if echo "$BODY" | grep -q "ASD Tunnel Works"; then
            echo "=== PROOF: Tunnel delivers content correctly ==="
          else
            echo "=== FAIL: Unexpected response ==="
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          asd caddy stop 2>/dev/null || true
          asd tunnel server stop 2>/dev/null || true
