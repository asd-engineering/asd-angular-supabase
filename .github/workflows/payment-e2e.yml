name: Payment E2E (Mollie Webhook via Tunnel)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  payment-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || (secrets.MOLLIE_API_KEY != '' && secrets.ASD_API_KEY != '') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Supabase
        run: npx supabase start

      - name: Wait for Supabase
        run: |
          for i in $(seq 1 30); do
            npx supabase status > /dev/null 2>&1 && break
            echo "Attempt $i/30 - waiting 2s..."
            sleep 2
          done

      - name: Get Supabase credentials
        id: supabase
        run: |
          STATUS=$(npx supabase status --output json)
          echo "api_url=$(echo "$STATUS" | jq -r '.API_URL')" >> "$GITHUB_OUTPUT"
          echo "anon_key=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> "$GITHUB_OUTPUT"
          echo "service_role_key=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Configure Mollie API key for edge functions
        run: |
          echo "MOLLIE_API_KEY=${{ secrets.MOLLIE_API_KEY }}" > supabase/.env.local

      - name: Install ASD CLI
        run: |
          RELEASE_URL="https://api.github.com/repos/asd-engineering/asd-cli/releases/latest"
          DOWNLOAD_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL" \
            | jq -r '.assets[] | select(.name | test("linux.*amd64.*tar.gz$")) | .browser_download_url')
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Failed to find ASD CLI download URL"
            exit 1
          fi
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$DOWNLOAD_URL" -o asd.tar.gz
          tar -xzf asd.tar.gz
          sudo mv asd /usr/local/bin/asd
          sudo chmod +x /usr/local/bin/asd
          asd --version

      - name: Provision tunnel credentials
        run: |
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" "https://api.asd.host/functions/v1/credential-provision" \
            -H "X-API-Key: ${{ secrets.ASD_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"project\": \"${{ github.repository }}\",
              \"ttl_minutes\": 30,
              \"metadata\": {
                \"ci_run_id\": \"${{ github.run_id }}\",
                \"ci_repository\": \"${{ github.repository }}\",
                \"ci_platform\": \"github\"
              }
            }")
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -1)
          RESPONSE=$(echo "$HTTP_RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to provision credentials (HTTP $HTTP_CODE)"
            echo "Response: $RESPONSE"
            exit 1
          fi

          ASD_CLIENT_ID=$(echo "$RESPONSE" | jq -r '.tunnel_client_id')
          ASD_CLIENT_SECRET=$(echo "$RESPONSE" | jq -r '.tunnel_client_secret')
          ASD_TUNNEL_HOST=$(echo "$RESPONSE" | jq -r '.tunnel_fqdn // .tunnel_host')
          ASD_TUNNEL_PORT=$(echo "$RESPONSE" | jq -r '.tunnel_port')

          echo "::add-mask::$ASD_CLIENT_SECRET"

          echo "ASD_CLIENT_ID=$ASD_CLIENT_ID" >> "$GITHUB_ENV"
          echo "ASD_CLIENT_SECRET=$ASD_CLIENT_SECRET" >> "$GITHUB_ENV"
          echo "ASD_TUNNEL_HOST=$ASD_TUNNEL_HOST" >> "$GITHUB_ENV"
          echo "ASD_TUNNEL_PORT=$ASD_TUNNEL_PORT" >> "$GITHUB_ENV"

          echo "Provisioned: client_id=$ASD_CLIENT_ID, host=$ASD_TUNNEL_HOST:$ASD_TUNNEL_PORT"

      - name: Write tunnel credentials to .env
        run: |
          cat >> .env <<EOF
          ASD_CLIENT_ID=${{ env.ASD_CLIENT_ID }}
          ASD_CLIENT_SECRET=${{ env.ASD_CLIENT_SECRET }}
          ASD_TUNNEL_HOST=${{ env.ASD_TUNNEL_HOST }}
          ASD_TUNNEL_PORT=${{ env.ASD_TUNNEL_PORT }}
          EOF

      - name: Start Caddy and apply network config
        run: |
          asd caddy start
          asd net apply --seed --caddy --tunnel

      - name: Construct tunnel URL
        id: tunnel
        run: |
          API_TUNNEL_URL="https://api-${{ env.ASD_CLIENT_ID }}.${{ env.ASD_TUNNEL_HOST }}/"
          echo "api_tunnel_url=$API_TUNNEL_URL" >> "$GITHUB_OUTPUT"
          echo "Tunnel URL: $API_TUNNEL_URL"

      - name: Wait for tunnel to be reachable
        run: |
          URL="${{ steps.tunnel.outputs.api_tunnel_url }}"
          echo "Polling $URL ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i/30 - HTTP $STATUS"
            if [ "$STATUS" != "000" ] && [ "$STATUS" != "502" ] && [ "$STATUS" != "503" ]; then
              echo "Tunnel reachable!"
              exit 0
            fi
            sleep 3
          done
          echo "Tunnel not reachable after 30 attempts"
          exit 1

      - name: Run payment E2E tests
        env:
          SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          API_TUNNEL_URL: ${{ steps.tunnel.outputs.api_tunnel_url }}
        run: pnpm exec playwright test e2e/payment-webhook.spec.ts --project=chromium

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-payment
          path: playwright-report/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          asd expose stop --all || true
          asd caddy stop || true
